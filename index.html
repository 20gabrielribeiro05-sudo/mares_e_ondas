<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condições de Surf e Vento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #f4f4f9; 
            padding: 20px; 
            margin: 0;
        }
        .chart-container { 
            position: relative; 
            width: 95vw; 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1); 
        }
        #status { 
            font-weight: bold; 
            color: #333; 
            margin-bottom: 20px;
        }
        #page-title {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h2 id="page-title">Canoagem/Surf/Windsurf - A procurar a tua localização...</h2>
    <p id="status">A pedir permissão de GPS ao browser...</p>
    
    <div class="chart-container">
        <canvas id="surfChart"></canvas>
    </div>

    <script>
        // Converte os graus em pontos cardeais
        function degToCompass(num) {
            const val = Math.floor((num / 22.5) + 0.5);
            const arr = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
            return arr[(val % 16)];
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(fetchData, showError);
        } else {
            document.getElementById('status').innerText = "O teu browser é pré-histórico. Não tem GPS.";
        }

        // Função de busca teimosa pela maré num raio de ~11km
        async function getTideTeimoso(lat, lon) {
            const offsets = [
                [0, 0],           // Ponto exato
                [0, -0.05],       // ~5km Oeste
                [-0.05, 0],       // ~5km Sul
                [0, 0.05],        // ~5km Este
                [0.05, 0],        // ~5km Norte
                [0, -0.1],        // ~11km Oeste
                [-0.1, 0],        // ~11km Sul
                [0, 0.1],         // ~11km Este
                [0.1, 0]          // ~11km Norte
            ];

            for (let i = 0; i < offsets.length; i++) {
                let testLat = lat + offsets[i][0];
                let testLon = lon + offsets[i][1];
                try {
                    let res = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${testLat}&longitude=${testLon}&hourly=ocean_tide&timezone=auto&forecast_days=1`);
                    if (res.ok) {
                        let data = await res.json();
                        if (!data.error && data.hourly && data.hourly.ocean_tide) {
                            return data.hourly.ocean_tide; 
                        }
                    }
                } catch (e) {
                    // Ignora o erro e continua para a próxima coordenada
                }
            }
            return null; // Se não encontrou maré de jeito nenhum
        }

        async function fetchData(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            document.getElementById('status').innerText = 'A processar as tuas coordenadas...';

            try {
                // 1. Descobrir o nome da localidade
                let locationName = "Localização Desconhecida";
                try {
                    const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const geoData = await geoRes.json();
                    locationName = geoData.address.city || geoData.address.town || geoData.address.village || geoData.address.county || "Tua Zona";
                } catch (e) {
                    console.warn("Nominatim falhou, caga nisso.");
                }

                document.getElementById('page-title').innerText = `Canoagem/Surf/Windsurf - ${locationName}`;
                document.getElementById('status').innerText = 'A sacar o vento e a procurar água para as marés...';

                // 2. O vento saca sempre das tuas coordenadas exatas
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_10m,winddirection_10m&timezone=auto&forecast_days=1`);
                if (!weatherRes.ok) throw new Error("A API do vento está em baixo.");
                const weatherData = await weatherRes.json();

                // 3. A maré procura à tua volta até encontrar água
                const tides = await getTideTeimoso(lat, lon);

                // Esconder mensagem de status porque já temos os dados
                document.getElementById('status').style.display = 'none';

                // Formatar dados para o gráfico
                const hourly = weatherData.hourly;
                const labels = hourly.time.map((timeString, index) => {
                    const date = new Date(timeString);
                    const hours = date.getHours().toString().padStart(2, '0') + ':00';
                    const dir = degToCompass(hourly.winddirection_10m[index]);
                    return [hours, dir]; 
                });

                const windSpeeds = hourly.windspeed_10m;

                drawChart(labels, windSpeeds, tides);

            } catch (err) {
                document.getElementById('status').innerText = 'Deu barraca a carregar a meteorologia. Vê a consola.';
                console.error(err);
            }
        }

        function showError(error) {
            let msg = "Erro desconhecido.";
            if (error.code === 1) msg = "Se não dás permissão de GPS, não há dados para ninguém.";
            if (error.code === 2) msg = "O teu GPS não está a apanhar rede.";
            if (error.code === 3) msg = "Demorou demasiado tempo a encontrar-te.";
            document.getElementById('status').innerText = msg;
            document.getElementById('page-title').innerText = "Canoagem/Surf/Windsurf - Localização Bloqueada";
        }

        function drawChart(labels, windSpeeds, tides) {
            const ctx = document.getElementById('surfChart').getContext('2d');
            
            const datasets = [{
                label: 'Vento (km/h)',
                data: windSpeeds,
                borderColor: 'rgba(54, 162, 235, 1)',
                backgroundColor: 'rgba(54, 162, 235, 0.1)',
                yAxisID: 'y-wind',
                tension: 0.3,
                fill: true
            }];

            const scales = {
                x: {
                    title: { display: true, text: 'Hora & Direção do Vento' }
                },
                'y-wind': {
                    type: 'linear',
                    display: true,
                    position: 'left',
                    title: { display: true, text: 'Vento (km/h)' }
                }
            };

            // Se o getTideTeimoso encontrou água, adicionamos as marés ao gráfico
            if (tides && tides.length > 0) {
                datasets.push({
                    label: 'Altura da Maré (m)',
                    data: tides,
                    borderColor: 'rgba(255, 99, 132, 1)',
                    backgroundColor: 'rgba(255, 99, 132, 0.1)',
                    yAxisID: 'y-tide',
                    tension: 0.4,
                    fill: true
                });
                
                scales['y-tide'] = {
                    type: 'linear',
                    display: true,
                    position: 'right',
                    title: { display: true, text: 'Maré (m)' },
                    grid: { drawOnChartArea: false }
                };
            } else {
                // Se não encontrou em 11km, dá um aviso na página
                document.getElementById('status').style.display = 'block';
                document.getElementById('status').innerText = "Vento carregado. Não encontrei marés num raio de 11km, só tens gráfico do vento.";
            }

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: scales
                }
            });
        }
    </script>
</body>
</html>
