<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Vento e Mar - Gráficos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            padding: 20px; 
            max-width: 900px;
            margin: 0 auto;
        }
        h1 { 
            text-align: center; 
            color: #4fa3d1; 
        }
        .status { 
            text-align: center; 
            font-style: italic; 
            color: #888; 
            margin: 20px 0;
        }
        .error { 
            color: #ff6b6b; 
            font-weight: bold; 
        }
        .chart-container {
            background: #242424;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #333;
            display: none;
        }
        canvas {
            max-height: 400px;
        }
        /* Estilos para a caixa de GPS Manual */
        .manual-gps {
            display: none;
            background: #242424;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #333;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        input {
            padding: 10px;
            margin: 5px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #333;
            color: white;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background: #4fa3d1;
            color: #121212;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        button:hover {
            background: #3b8bb5;
        }
    </style>
</head>
<body>

    <h1>Evolução do Spot (Hoje)</h1>
    <div id="status" class="status">A caçar o sinal de GPS...</div>
    
    <div class="manual-gps" id="manual-gps">
        <p class="error">O browser bloqueou o GPS. Mete as coordenadas à mão:</p>
        <p style="font-size: 12px; color: #888;">Exemplo Ericeira -> Lat: 38.96 | Lon: -9.41</p>
        <input type="number" id="lat-input" placeholder="Latitude" step="any">
        <input type="number" id="lon-input" placeholder="Longitude" step="any">
        <br><br>
        <button onclick="carregarManual()">Gerar Gráficos</button>
    </div>

    <div class="chart-container" id="charts-container">
        <canvas id="ventoChart"></canvas>
        <br><br>
        <canvas id="ondaChart"></canvas>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const chartsContainer = document.getElementById('charts-container');
        const manualGps = document.getElementById('manual-gps');
        let chartVento, chartOnda; // Variáveis para apagar gráficos antigos se fizeres nova pesquisa

        function formatarHora(dataIso) {
            const data = new Date(dataIso);
            return data.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
        }

        // Tentar o GPS automático
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                (position) => puxarDados(position.coords.latitude, position.coords.longitude),
                showError
            );
        } else {
            showError({message: "Browser pré-histórico."});
        }

        // Função do botão manual
        function carregarManual() {
            const lat = document.getElementById('lat-input').value;
            const lon = document.getElementById('lon-input').value;
            if(lat && lon) {
                manualGps.style.display = 'none';
                puxarDados(lat, lon);
            } else {
                alert("Mete lá os dois valores, não sejas nabo.");
            }
        }

        // Função que vai buscar os dados e desenha tudo
        async function puxarDados(lat, lon) {
            statusEl.innerText = "Coordenadas prontas. A gerar os gráficos...";
            statusEl.style.display = 'block';
            chartsContainer.style.display = 'none';

            try {
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_gusts_10m&forecast_days=1&timezone=auto`;
                const weatherRes = await fetch(weatherUrl);
                const weatherData = await weatherRes.json();

                const marineUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=wave_height,wave_period&forecast_days=1&timezone=auto`;
                const marineRes = await fetch(marineUrl);
                const marineData = await marineRes.json();

                const labels = weatherData.hourly.time.map(formatarHora);
                const ventoVel = weatherData.hourly.wind_speed_10m;
                const ventoRaj = weatherData.hourly.wind_gusts_10m;
                const ondaAlt = marineData.hourly.wave_height.map(val => val === null ? 0 : val);

                statusEl.style.display = 'none';
                chartsContainer.style.display = 'block';

                // Destruir os gráficos antigos se existirem, senão dá barraca ao desenhar por cima
                if (chartVento) chartVento.destroy();
                if (chartOnda) chartOnda.destroy();

                const ctxVento = document.getElementById('ventoChart').getContext('2d');
                chartVento = new Chart(ctxVento, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Vento (km/h)', data: ventoVel, borderColor: '#4fa3d1', backgroundColor: 'rgba(79, 163, 209, 0.2)', borderWidth: 2, tension: 0.3, fill: true },
                            { label: 'Rajadas (km/h)', data: ventoRaj, borderColor: '#ff6b6b', borderDash: [5, 5], borderWidth: 2, tension: 0.3, fill: false }
                        ]
                    },
                    options: { responsive: true, plugins: { legend: { labels: { color: '#e0e0e0' } }, title: { display: true, text: 'Vento e Rajadas', color: '#fff', font: { size: 16 } } }, scales: { x: { ticks: { color: '#aaa' }, grid: { color: '#333' } }, y: { ticks: { color: '#aaa' }, grid: { color: '#333' } } } }
                });

                const ctxOnda = document.getElementById('ondaChart').getContext('2d');
                chartOnda = new Chart(ctxOnda, {
                    type: 'bar',
                    data: { labels: labels, datasets: [{ label: 'Altura da Onda (m)', data: ondaAlt, backgroundColor: '#2ecc71', borderRadius: 4 }] },
                    options: { responsive: true, plugins: { legend: { labels: { color: '#e0e0e0' } }, title: { display: true, text: 'Tamanho do Mar', color: '#fff', font: { size: 16 } } }, scales: { x: { ticks: { color: '#aaa' }, grid: { display: false } }, y: { ticks: { color: '#aaa' }, grid: { color: '#333' } } } }
                });

            } catch (error) {
                statusEl.innerHTML = "<span class='error'>A API encravou.</span>";
                console.error(error);
            }
        }

        // Se o GPS der erro, abre a caixa para inserir à mão
        function showError(error) {
            statusEl.style.display = 'none';
            manualGps.style.display = 'block';
            console.warn("Motivo da falha de GPS:", error.message);
        }
    </script>
</body>
</html>
