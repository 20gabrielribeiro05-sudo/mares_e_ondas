<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condições, Velhinho</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 { margin-bottom: 5px; color: #fff; }
        #status { color: #aaa; margin-bottom: 20px; font-style: italic; }
        .chart-wrapper {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto 40px auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <h1>As tuas condições agora</h1>
    <div id="status">A procurar a tua localização... não te esqueças de dar permissão no browser.</div>

    <div class="chart-wrapper">
        <canvas id="windTideChart"></canvas>
    </div>

    <script>
        // Função para converter graus do vento em setas apontando a direção
        function getWindDirection(degree) {
            if (degree === null || degree === undefined) return '-';
            const arrows = ['↓', '↙', '←', '↖', '↑', '↗', '→', '↘'];
            return arrows[Math.round(degree / 45) % 8];
        }

        // Função para definir as cores do vento
        function getWindColor(speed) {
            if (speed < 15) return 'rgba(46, 204, 113, 0.8)'; // Verde (Fraco)
            if (speed < 30) return 'rgba(241, 196, 15, 0.8)'; // Amarelo (Moderado)
            return 'rgba(231, 76, 60, 0.8)'; // Vermelho (Forte)
        }

        navigator.geolocation.getCurrentPosition(async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            document.getElementById('status').innerText = `Localização: ${lat.toFixed(4)}, ${lon.toFixed(4)}. A sacar dados...`;

            try {
                // Sacar Vento da Open-Meteo
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_gusts_10m,wind_direction_10m&timezone=auto`);
                const weatherData = await weatherRes.json();

                if (weatherData.error) {
                    throw new Error("Erro na API do tempo: " + weatherData.reason);
                }

                // Usar apenas as próximas 24 horas
                const hours = weatherData.hourly.time.slice(0, 24).map(t => new Date(t).getHours() + 'h');
                const windSpeeds = weatherData.hourly.wind_speed_10m.slice(0, 24);
                const windGusts = weatherData.hourly.wind_gusts_10m.slice(0, 24);
                const windDirs = weatherData.hourly.wind_direction_10m.slice(0, 24).map(getWindDirection);
                
                document.getElementById('status').innerText = "Tudo pronto.";

                // Eixo X com dupla linha: Hora e Direção do vento por baixo
                const labels = hours.map((h, i) => [h, windDirs[i]]);
                const windColors = windSpeeds.map(getWindColor);

                // Gerar a linha da Maré falsa (ciclo de 12h25m, oscila entre 0.5m e 3.5m)
                const tideSim = Array.from({length: 24}, (_, i) => (2 + 1.5 * Math.sin(i * (Math.PI * 2 / 12.4))).toFixed(2));

                // GRÁFICO: Vento e Marés
                const ctx1 = document.getElementById('windTideChart').getContext('2d');
                new Chart(ctx1, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                type: 'line',
                                label: 'Maré Simulada (m)',
                                data: tideSim,
                                borderColor: '#3498db', // Azul
                                backgroundColor: 'rgba(52, 152, 219, 0.2)',
                                borderWidth: 3,
                                fill: true,
                                tension: 0.4,
                                yAxisID: 'yRight'
                            },
                            {
                                type: 'line',
                                label: 'Rajadas (km/h)',
                                data: windGusts,
                                borderColor: 'rgba(255, 255, 255, 0.7)',
                                borderDash: [5, 5],
                                borderWidth: 2,
                                fill: false,
                                tension: 0.3,
                                yAxisID: 'yLeft'
                            },
                            {
                                type: 'bar',
                                label: 'Vento Médio (km/h)',
                                data: windSpeeds,
                                backgroundColor: windColors,
                                borderRadius: 5,
                                yAxisID: 'yLeft'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            title: { display: true, text: 'Vento e Marés', color: '#fff', font: { size: 18 } },
                            legend: { labels: { color: '#e0e0e0' } }
                        },
                        scales: {
                            x: {
                                ticks: { color: '#e0e0e0', font: { size: 14 } },
                                grid: { color: 'rgba(255, 255, 255, 0.1)' }
                            },
                            yLeft: {
                                type: 'linear',
                                position: 'left',
                                title: { display: true, text: 'Vento (km/h)', color: '#fff' },
                                ticks: { color: '#e0e0e0' },
                                grid: { color: 'rgba(255, 255, 255, 0.1)' }
                            },
                            yRight: {
                                type: 'linear',
                                position: 'right',
                                title: { display: true, text: 'Altura da Maré (m)', color: '#3498db' },
                                ticks: { color: '#3498db' },
                                grid: { drawOnChartArea: false } 
                            }
                        }
                    }
                });

            } catch (error) {
                document.getElementById('status').innerText = "Continuou a dar bronca. Erro: " + error.message;
                console.error(error);
            }
        }, (error) => {
            document.getElementById('status').innerText = "Deu erro no GPS. Precisas de permitir a localização no browser, chefe.";
        });
    </script>
</body>
</html>
