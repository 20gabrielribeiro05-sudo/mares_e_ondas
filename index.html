<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marine Conditions</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
  }

  canvas {
    max-width: 100%;
    margin-top: 20px;
  }
</style>
</head>
<body>

<h2>Today's Wind & Waves</h2>
<p id="status">Getting location...</p>

<canvas id="chart"></canvas>

<script>
async function getData(lat, lon) {
  const url = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=wave_height,wind_speed_10m,wind_direction_10m&timezone=auto`;

  const res = await fetch(url);
  const data = await res.json();

  return data.hourly;
}

function createChart(hours, windSpeed, waveHeight, windDir) {
  const ctx = document.getElementById('chart').getContext('2d');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: hours,
      datasets: [
        {
          label: 'Wind Speed (km/h)',
          data: windSpeed,
          borderWidth: 2,
          yAxisID: 'y1',
          tension: 0.3
        },
        {
          label: 'Wave Height (m)',
          data: waveHeight,
          borderWidth: 2,
          yAxisID: 'y2',
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true,
      interaction: {
        mode: 'index',
        intersect: false
      },
      scales: {
        x: {
          ticks: {
            callback: function(value, index) {
              return hours[index] + "\n" + windDir[index] + "°";
            }
          }
        },
        y1: {
          type: 'linear',
          position: 'left',
          title: {
            display: true,
            text: 'Wind (km/h)'
          }
        },
        y2: {
          type: 'linear',
          position: 'right',
          title: {
            display: true,
            text: 'Wave (m)'
          },
          grid: {
            drawOnChartArea: false
          }
        }
      }
    }
  });
}

navigator.geolocation.getCurrentPosition(async (pos) => {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;

  document.getElementById("status").innerText =
    `Location: ${lat.toFixed(2)}, ${lon.toFixed(2)}`;

  const data = await getData(lat, lon);

  const hours = data.time.map(t => t.split("T")[1].slice(0,5));
  const windSpeed = data.wind_speed_10m;
  const waveHeight = data.wave_height;
  const windDir = data.wind_direction_10m;

  createChart(hours, windSpeed, waveHeight, windDir);

}, () => {
  document.getElementById("status").innerText = "Location access denied.";
});
</script>

</body>
</html>
