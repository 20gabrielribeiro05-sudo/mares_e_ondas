<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condições de Surf e Vento</title>
    <!-- Carregar a biblioteca do gráfico -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #f4f4f9; 
            padding: 20px; 
            margin: 0;
        }
        .chart-container { 
            position: relative; 
            width: 95vw; 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1); 
        }
        #status { 
            font-weight: bold; 
            color: #333; 
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h2>Condições Atuais para a Tua Localização</h2>
    <p id="status">A pedir permissão de GPS ao browser...</p>
    
    <div class="chart-container">
        <canvas id="surfChart"></canvas>
    </div>

    <script>
        // Transforma os graus da direção do vento em letras
        function degToCompass(num) {
            const val = Math.floor((num / 22.5) + 0.5);
            const arr = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
            return arr[(val % 16)];
        }

        // Arranca com o pedido de localização mal a página abre
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(fetchData, showError);
        } else {
            document.getElementById('status').innerText = "O teu browser é velho e não suporta GPS.";
        }

        async function fetchData(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            document.getElementById('status').innerText = 'A sacar dados meteorológicos...';

            try {
                // Vai buscar vento (Weather API) e marés (Marine API) para o dia atual
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_10m,winddirection_10m&timezone=auto&forecast_days=1`);
                const marineRes = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=ocean_tide&timezone=auto&forecast_days=1`);

                if (!weatherRes.ok || !marineRes.ok) throw new Error("A API mandou-nos dar uma volta.");

                const weatherData = await weatherRes.json();
                const marineData = await marineRes.json();

                document.getElementById('status').style.display = 'none'; // Esconde a mensagem

                const hourly = weatherData.hourly;
                const marineHourly = marineData.hourly;

                // Montar o eixo X: O Chart.js aceita arrays dentro de arrays para fazer linhas múltiplas (Hora em cima, Direção em baixo)
                const labels = hourly.time.map((timeString, index) => {
                    const date = new Date(timeString);
                    const hours = date.getHours().toString().padStart(2, '0') + ':00';
                    const dir = degToCompass(hourly.winddirection_10m[index]);
                    return [hours, dir]; 
                });

                const windSpeeds = hourly.windspeed_10m;
                const tides = marineHourly.ocean_tide;

                drawChart(labels, windSpeeds, tides);

            } catch (err) {
                document.getElementById('status').innerText = 'Deu merda ao carregar os dados. Vê a consola.';
                console.error(err);
            }
        }

        function showError(error) {
            let msg = "Erro desconhecido.";
            if (error.code === 1) msg = "Velhinho, negaste o acesso à localização. Assim não adivinho.";
            if (error.code === 2) msg = "Não consegui aceder ao GPS.";
            if (error.code === 3) msg = "O pedido de GPS demorou demasiado tempo.";
            document.getElementById('status').innerText = msg;
        }

        function drawChart(labels, windSpeeds, tides) {
            const ctx = document.getElementById('surfChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Vento (km/h)',
                            data: windSpeeds,
                            borderColor: 'rgba(54, 162, 235, 1)',
                            backgroundColor: 'rgba(54, 162, 235, 0.1)',
                            yAxisID: 'y-wind',
                            tension: 0.3,
                            fill: true
                        },
                        {
                            label: 'Altura da Maré (m)',
                            data: tides,
                            borderColor: 'rgba(255, 99, 132, 1)',
                            backgroundColor: 'rgba(255, 99, 132, 0.1)',
                            yAxisID: 'y-tide',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        x: {
                            title: { display: true, text: 'Hora & Direção do Vento' }
                        },
                        'y-wind': {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: { display: true, text: 'Vento (km/h)' }
                        },
                        'y-tide': {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: 'Maré (m)' },
                            grid: { drawOnChartArea: false } // Para as linhas não ficarem uma grande confusão visual
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
