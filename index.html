<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Vento e Mar - Gráficos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            padding: 20px; 
            max-width: 900px;
            margin: 0 auto;
        }
        h1 { 
            text-align: center; 
            color: #4fa3d1; 
        }
        .status { 
            text-align: center; 
            font-style: italic; 
            color: #888; 
            margin: 20px 0;
        }
        .error { 
            color: #ff6b6b; 
            font-weight: bold; 
        }
        .chart-container {
            background: #242424;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #333;
            display: none;
        }
        canvas {
            max-height: 400px;
        }
    </style>
</head>
<body>

    <h1>Evolução do Spot (Hoje)</h1>
    <div id="status" class="status">A caçar o sinal de GPS...</div>
    
    <div class="chart-container" id="charts-container">
        <canvas id="ventoChart"></canvas>
        <br><br>
        <canvas id="ondaChart"></canvas>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const chartsContainer = document.getElementById('charts-container');

        // Formatar as horas para o eixo X do gráfico
        function formatarHora(dataIso) {
            const data = new Date(dataIso);
            return data.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(fetchData, showError);
        } else {
            statusEl.innerHTML = "<span class='error'>O teu browser é muito velho. Não tem GPS.</span>";
        }

        async function fetchData(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            statusEl.innerText = "Coordenadas apanhadas. A gerar os gráficos...";

            try {
                // Ir buscar dados do Vento
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_gusts_10m&forecast_days=1&timezone=auto`;
                const weatherRes = await fetch(weatherUrl);
                const weatherData = await weatherRes.json();

                // Ir buscar dados do Mar
                const marineUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=wave_height,wave_period&forecast_days=1&timezone=auto`;
                const marineRes = await fetch(marineUrl);
                const marineData = await marineRes.json();

                // Preparar as arrays para o Chart.js
                const labels = weatherData.hourly.time.map(formatarHora);
                const ventoVel = weatherData.hourly.wind_speed_10m;
                const ventoRaj = weatherData.hourly.wind_gusts_10m;
                
                // Tratar os dados do mar (substituir nulls por 0 para o gráfico não berrar)
                const ondaAlt = marineData.hourly.wave_height.map(val => val === null ? 0 : val);

                // Apagar a mensagem de status e mostrar o contentor dos gráficos
                statusEl.style.display = 'none';
                chartsContainer.style.display = 'block';

                // Desenhar Gráfico do Vento
                const ctxVento = document.getElementById('ventoChart').getContext('2d');
                new Chart(ctxVento, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Vento (km/h)',
                                data: ventoVel,
                                borderColor: '#4fa3d1',
                                backgroundColor: 'rgba(79, 163, 209, 0.2)',
                                borderWidth: 2,
                                tension: 0.3,
                                fill: true
                            },
                            {
                                label: 'Rajadas (km/h)',
                                data: ventoRaj,
                                borderColor: '#ff6b6b',
                                borderDash: [5, 5],
                                borderWidth: 2,
                                tension: 0.3,
                                fill: false
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { labels: { color: '#e0e0e0' } },
                            title: { display: true, text: 'Vento e Rajadas', color: '#fff', font: { size: 16 } }
                        },
                        scales: {
                            x: { ticks: { color: '#aaa' }, grid: { color: '#333' } },
                            y: { ticks: { color: '#aaa' }, grid: { color: '#333' } }
                        }
                    }
                });

                // Desenhar Gráfico do Mar
                const ctxOnda = document.getElementById('ondaChart').getContext('2d');
                new Chart(ctxOnda, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Altura da Onda (m)',
                                data: ondaAlt,
                                backgroundColor: '#2ecc71',
                                borderRadius: 4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { labels: { color: '#e0e0e0' } },
                            title: { display: true, text: 'Tamanho do Mar', color: '#fff', font: { size: 16 } }
                        },
                        scales: {
                            x: { ticks: { color: '#aaa' }, grid: { display: false } },
                            y: { ticks: { color: '#aaa' }, grid: { color: '#333' } }
                        }
                    }
                });

            } catch (error) {
                statusEl.innerHTML = "<span class='error'>A API falhou e não enviou os dados. Tenta outra vez.</span>";
                console.error(error);
            }
        }

        function showError(error) {
            statusEl.innerHTML = `<span class='error'>GPS bloqueado ou indisponível. Erro: ${error.message}</span>`;
        }
    </script>
</body>
</html>
