<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Teu Spot - Velhinho</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #00d2ff; }
        .dashboard { background: #1e1e1e; border-radius: 12px; padding: 20px; max-width: 400px; margin: 20px auto; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button { background: #00d2ff; color: #121212; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        button:hover { background: #00a8cc; }
        .dado { font-size: 24px; margin: 15px 0; padding: 10px; background: #2a2a2a; border-radius: 8px; }
        .erro { color: #ff4c4c; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>Como é que está o mar, Velhinho?</h1>
    <p>Clica para puxar o GPS onde estás agora.</p>
    
    <button id="btn-puxar">Ver Condições do Meu Local</button>
    <p id="msg-erro" class="erro"></p>

    <div id="dashboard" class="dashboard">
        <h2>Condições Atuais:</h2>
        <div class="dado">🌊 Ondas: <strong id="onda">-</strong></div>
        <div class="dado">🌬️ Vento: <strong id="vento">-</strong></div>
    </div>

    <script>
        const btn = document.getElementById('btn-puxar');
        const dash = document.getElementById('dashboard');
        const erroMsg = document.getElementById('msg-erro');

        btn.addEventListener('click', () => {
            erroMsg.innerText = "A procurar o teu GPS... acorda lá isso!";
            dash.style.display = "none";

            if (!navigator.geolocation) {
                erroMsg.innerText = "O teu browser é pré-histórico, não tem GPS.";
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                try {
                    erroMsg.innerText = `GPS apanhado! A puxar os dados do mar...`;
                    
                    const resOndas = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&current=wave_height&timezone=auto`);
                    if (!resOndas.ok) throw new Error("A API das ondas mandou-nos dar uma curva.");
                    const dadosOndas = await resOndas.json();

                    const resVento = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`);
                    if (!resVento.ok) throw new Error("A API do vento está em baixo.");
                    const dadosVento = await resVento.json();

                    erroMsg.innerText = "";
                    dash.style.display = "block";

                    const alturaOnda = dadosOndas.current?.wave_height;
                    const velVento = dadosVento.current_weather?.windspeed;

                    document.getElementById('onda').innerText = alturaOnda !== undefined ? `${alturaOnda} metros` : 'Liso que nem uma lagoa';
                    document.getElementById('vento').innerText = velVento !== undefined ? `${velVento} km/h` : 'Sem dados';

                } catch (err) {
                    erroMsg.innerText = `Deu raia na ligação: ${err.message}`;
                }

            }, (erroGPS) => {
                erroMsg.innerText = `O GPS falhou: ${erroGPS.message}. Vai às definições dar permissão a esta porcaria!`;
            }, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        });
    </script>
</body>
</html>
