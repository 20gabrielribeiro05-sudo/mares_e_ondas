<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condições de Surf e Vento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #f4f4f9; 
            padding: 20px; 
            margin: 0;
        }
        .chart-container { 
            position: relative; 
            width: 95vw; 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1); 
        }
        #status { 
            font-weight: bold; 
            color: #333; 
            margin-bottom: 20px;
        }
        #page-title {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h2 id="page-title">Canoagem/Surf/Windsurf - A procurar a tua localização...</h2>
    <p id="status">A pedir permissão de GPS ao browser...</p>
    
    <div class="chart-container">
        <canvas id="surfChart"></canvas>
    </div>

    <script>
        function degToCompass(num) {
            const val = Math.floor((num / 22.5) + 0.5);
            const arr = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
            return arr[(val % 16)];
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(fetchData, showError);
        } else {
            document.getElementById('status').innerText = "O teu browser não tem GPS.";
        }

        // Radar esticado até aos ~33km para apanhar o Tejo na Póvoa
        async function getTideTeimoso(lat, lon) {
            const offsets = [
                [0, 0],           
                [0, -0.05], [-0.05, 0], [0, 0.05], [0.05, 0],         // ~5km
                [0, -0.1], [-0.1, 0], [0, 0.1], [0.1, 0],             // ~11km
                [0, -0.15], [-0.15, 0], [0, 0.15], [0.15, 0],         // ~16km
                [0, -0.2], [-0.2, 0], [0, 0.2], [0.2, 0],             // ~22km
                [0, -0.25], [-0.25, 0], [0, 0.25], [0.25, 0],         // ~27km
                [0, -0.3], [-0.3, 0], [0, 0.3], [0.3, 0]              // ~33km
            ];

            for (let i = 0; i < offsets.length; i++) {
                let testLat = lat + offsets[i][0];
                let testLon = lon + offsets[i][1];
                try {
                    let res = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${testLat}&longitude=${testLon}&hourly=ocean_tide&timezone=auto&forecast_days=1`);
                    if (res.ok) {
                        let data = await res.json();
                        if (!data.error && data.hourly && data.hourly.ocean_tide) {
                            console.log(`Maré encontrada a ${Math.round(Math.max(Math.abs(offsets[i][0]), Math.abs(offsets[i][1])) * 111)}km de distância.`);
                            return data.hourly.ocean_tide; 
                        }
                    }
                } catch (e) {}
            }
            return null; 
        }

        async function fetchData(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            document.getElementById('status').innerText = 'A processar coordenadas...';

            try {
                let locationName = "Localização Desconhecida";
                try {
                    const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const geoData = await geoRes.json();
                    locationName = geoData.address.city || geoData.address.town || geoData.address.village || geoData.address.county || "Tua Zona";
                } catch (e) {}

                document.getElementById('page-title').innerText = `Canoagem/Surf/Windsurf - ${locationName}`;
                document.getElementById('status').innerText = 'A varrer o mapa à procura de marés (raio de 33km)...';

                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_10m,winddirection_10m&timezone=auto&forecast_days=1`);
                if (!weatherRes.ok) throw new Error("A API do vento pifou.");
                const weatherData = await weatherRes.json();

                // Busca hiper-teimosa a funcionar
                const tides = await getTideTeimoso(lat, lon);

                document.getElementById('status').style.display = 'none';

                const hourly = weatherData.hourly;
                const labels = hourly.time.map((timeString, index) => {
                    const date = new Date(timeString);
                    const hours = date.getHours().toString().padStart(2, '0') + ':00';
                    const dir = degToCompass(hourly.winddirection_10m[index]);
                    return [hours, dir]; 
                });

                const windSpeeds = hourly.windspeed_10m;

                drawChart(labels, windSpeeds, tides);

            } catch (err) {
                document.getElementById('status').innerText = 'Erro brutal a carregar os dados. Vê a consola.';
                console.error(err);
            }
        }

        function showError(error) {
            let msg = "Erro desconhecido.";
            if (error.code === 1) msg = "Sem permissão de GPS não fazemos nada.";
            if (error.code === 2) msg = "O GPS falhou.";
            if (error.code === 3) msg = "Demorou demasiado tempo.";
            document.getElementById('status').innerText = msg;
            document.getElementById('page-title').innerText = "Canoagem/Surf/Windsurf - Sem GPS";
        }

        function drawChart(labels, windSpeeds, tides) {
            const ctx = document.getElementById('surfChart').getContext('2d');
            
            const datasets = [{
                label: 'Vento (km/h)',
                data: windSpeeds,
                borderColor: 'rgba(54, 162, 235, 1)',
                backgroundColor: 'rgba(54, 162, 235, 0.1)',
                yAxisID: 'y-wind',
                tension: 0.3,
                fill: true
            }];

            const scales = {
                x: {
                    title: { display: true, text: 'Hora & Direção do Vento' }
                },
                'y-wind': {
                    type: 'linear',
                    display: true,
                    position: 'left',
                    title: { display: true, text: 'Vento (km/h)' }
                }
            };

            if (tides && tides.length > 0) {
                datasets.push({
                    label: 'Altura da Maré (m)',
                    data: tides,
                    borderColor: 'rgba(255, 99, 132, 1)',
                    backgroundColor: 'rgba(255, 99, 132, 0.1)',
                    yAxisID: 'y-tide',
                    tension: 0.4,
                    fill: true
                });
                
                scales['y-tide'] = {
                    type: 'linear',
                    display: true,
                    position: 'right',
                    title: { display: true, text: 'Maré (m)' },
                    grid: { drawOnChartArea: false }
                };
            } else {
                document.getElementById('status').style.display = 'block';
                document.getElementById('status').innerText = "Vento carregado. Mas o radar varreu 33km e não encontrou marés. A API deve estar aziada com o Tejo.";
            }

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: scales
                }
            });
        }
    </script>
</body>
</html>
