<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canoe & Kayak | Pro Forecast</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card: #151921;
            --border: #2d333b;
            --accent: #2ea043; /* Green for river/nature */
            --text: #adbac7;
            --title: #f0f6fc;
            --warning: #f85149;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 1000px; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-weight: 600;
            font-size: 2rem;
            color: var(--title);
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-fill-color: transparent;
        }

        select, input {
            background: var(--bg);
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 0.95rem;
            outline: none;
        }

        #status {
            background: rgba(46, 160, 67, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid var(--accent);
        }

        .dashboard-controls {
            display: none;
            grid-template-columns: auto 1fr 1.5fr;
            gap: 20px;
            align-items: center;
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-group label { font-size: 0.75rem; font-weight: 600; color: #768390; text-transform: uppercase; letter-spacing: 0.5px; }

        .compass-box {
            background: var(--bg);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .compass-svg { width: 45px; height: 45px; }

        .chart-container {
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .guide-bar {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            font-size: 0.8rem;
            color: #768390;
        }

        .disclaimer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #444c56;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <select id="langPicker">
            <option value="en">English</option>
            <option value="pt">Português</option>
        </select>
        <h1 id="ui-title">Canoeing Forecast</h1>
        <div style="width: 70px;"></div> 
    </div>

    <div id="status">Syncing with river sensors...</div>

    <div class="dashboard-controls" id="controls">
        <div class="compass-box">
            <svg class="compass-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#2d333b" stroke-width="2"/>
                <path d="M50 10 L44 50 L50 44 L56 50 Z" fill="#2ea043"/>
                <path d="M50 90 L44 50 L50 56 L56 50 Z" fill="#adbac7"/>
                <text x="50" y="30" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">N</text>
            </svg>
        </div>

        <div class="control-group">
            <label id="ui-label-day">Paddle Day</label>
            <select id="dayPicker"></select>
        </div>

        <div class="control-group">
            <label id="ui-label-sync">Sync Tide (Crucial for Estuaries)</label>
            <input type="time" id="tideSync" value="12:00">
        </div>
    </div>

    <div class="chart-container">
        <canvas id="mainChart"></canvas>
        
        <div class="guide-bar" id="ui-guide">
            <div id="guide-1">1. Set Location</div>
            <div id="guide-2">2. Pick Day</div>
            <div id="guide-3">3. Check Current</div>
        </div>
    </div>

    <div class="disclaimer" id="ui-disclaimer"></div>
</div>

<script>
    const translations = {
        en: {
            title: "Canoe & Kayak Forecast",
            statusData: "Loading river metrics...",
            statusLoc: "Location required for safety.",
            labelDay: "Paddling Day",
            labelSync: "Sync Estuary High Tide",
            chartTide: "Tide Level (m)",
            chartWind: "Wind Speed",
            chartGusts: "Gusts (Beware!)",
            yWind: "km/h",
            yTide: "Height (m)",
            disclaimer: "Specialized canoeing projection. Wind colors: Green < 12km/h (Easy), Yellow < 22km/h (Hard), Red > 22km/h (Danger)."
        },
        pt: {
            title: "Previsão de Canoagem",
            statusData: "A obter métricas do rio...",
            statusLoc: "Localização necessária por segurança.",
            labelDay: "Dia da Remada",
            labelSync: "Sincronizar Maré (Estuário)",
            chartTide: "Nível da Água (m)",
            chartWind: "Vento",
            chartGusts: "Rajadas (Cuidado!)",
            yWind: "km/h",
            yTide: "Altura (m)",
            disclaimer: "Projeção especializada para canoagem. Cores: Verde < 12km/h (Fácil), Amarelo < 22km/h (Duro), Vermelho > 22km/h (Perigo)."
        }
    };

    let weatherData = null, daysMap = {}, activeChart = null;
    let currentLang = localStorage.getItem('preferredLang') || 'en';
    const LUNAR_CYCLE = 12.4206;

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('ui-title').innerText = t.title;
        document.getElementById('ui-label-day').innerText = t.labelDay;
        document.getElementById('ui-label-sync').innerText = t.labelSync;
        document.getElementById('ui-disclaimer').innerHTML = t.disclaimer;
        if (weatherData) render(document.getElementById('dayPicker').value);
    }

    document.getElementById('langPicker').onchange = (e) => {
        currentLang = e.target.value;
        localStorage.setItem('preferredLang', currentLang);
        updateUI();
    };

    function getWindColor(speed) {
        // Stricter limits for Canoeing safety
        if (speed < 12) return '#3fb950'; // Green
        if (speed < 22) return '#d29922'; // Yellow
        return '#f85149'; // Red
    }

    function render(dateKey) {
        const t = translations[currentLang], indices = daysMap[dateKey];
        const firstHour = new Date(weatherData.hourly.time[0]).getTime();
        
        const labels = indices.map(i => [`${new Date(weatherData.hourly.time[i]).getHours()}h`, ['↓', '↙', '←', '↖', '↑', '↗', '→', '↘'][Math.round(weatherData.hourly.wind_direction_10m[i] / 45) % 8]]);
        const speeds = indices.map(i => weatherData.hourly.wind_speed_10m[i]);
        const gusts = indices.map(i => weatherData.hourly.wind_gusts_10m[i]);
        const tides = indices.map(i => {
            const phase = (((new Date(weatherData.hourly.time[i]).getTime() - firstHour) / 3600000) / LUNAR_CYCLE) * Math.PI * 2;
            return (2 + 1.5 * Math.sin(phase + parseFloat(localStorage.getItem('tideOffset') || 0))).toFixed(2);
        });

        if (activeChart) activeChart.destroy();
        activeChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { type: 'line', label: t.chartTide, data: tides, borderColor: '#2ea043', backgroundColor: 'rgba(46,160,67,0.1)', fill: true, tension: 0.4, yAxisID: 'yT', pointRadius: 0 },
                    { type: 'line', label: t.chartGusts, data: gusts, borderColor: 'rgba(255,255,255,0.2)', borderDash: [3,3], yAxisID: 'yV', pointRadius: 0 },
                    { type: 'bar', label: t.chartWind, data: speeds, backgroundColor: speeds.map(getWindColor), borderRadius: 6, yAxisID: 'yV' }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    yV: { position: 'left', title: { display: true, text: t.yWind }, grid: { color: '#2d333b' } },
                    yT: { position: 'right', grid: { display: false }, min: 0, max: 4, ticks: { color: '#2ea043' } }
                }
            }
        });
    }

    navigator.geolocation.getCurrentPosition(async (p) => {
        const { latitude: lat, longitude: lon } = p.coords;
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_gusts_10m,wind_direction_10m&timezone=auto`);
            weatherData = await res.json();
            weatherData.hourly.time.forEach((t, i) => { const d = t.split('T')[0]; if (!daysMap[d]) daysMap[d] = []; daysMap[d].push(i); });
            
            const sel = document.getElementById('dayPicker');
            Object.keys(daysMap).forEach(d => {
                const opt = document.createElement('option'); opt.value = d;
                opt.innerText = new Date(d).toLocaleDateString(currentLang === 'en' ? 'en-GB' : 'pt-PT', { weekday: 'short', day: 'numeric' });
                sel.appendChild(opt);
            });

            document.getElementById('status').style.display = 'none';
            document.getElementById('controls').style.display = 'grid';
            
            const syncTide = (val) => {
                const [h, m] = val.split(':'), diff = (new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate(), h, m) - new Date(weatherData.hourly.time[0])) / 3600000;
                const offset = (Math.PI / 2) - ((diff / LUNAR_CYCLE) * Math.PI * 2);
                localStorage.setItem('tideOffset', offset);
                localStorage.setItem('tideTime', val);
                render(sel.value);
            };

            const tideInput = document.getElementById('tideSync');
            tideInput.value = localStorage.getItem('tideTime') || "12:00";
            tideInput.onchange = (e) => syncTide(e.target.value);
            syncTide(tideInput.value);
            sel.onchange = () => render(sel.value);
            updateUI();
        } catch (e) { document.getElementById('status').innerText = "Sensor Error."; }
    }, () => { document.getElementById('status').innerText = "Location needed."; });
</script>

</body>
</html>
