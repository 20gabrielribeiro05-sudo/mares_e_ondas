<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condições de Surf e Vento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #f4f4f9; 
            padding: 20px; 
            margin: 0;
        }
        .chart-container { 
            position: relative; 
            width: 95vw; 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1); 
        }
        #status { 
            font-weight: bold; 
            color: #333; 
            margin-bottom: 20px;
        }
        #page-title {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h2 id="page-title">Canoagem/Surf/Windsurf - A procurar o mar...</h2>
    <p id="status">A pedir permissão de GPS ao browser...</p>
    
    <div class="chart-container">
        <canvas id="surfChart"></canvas>
    </div>

    <script>
        function degToCompass(num) {
            const val = Math.floor((num / 22.5) + 0.5);
            const arr = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
            return arr[(val % 16)];
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(fetchData, showError);
        } else {
            document.getElementById('status').innerText = "O teu browser é velho e não suporta GPS.";
            document.getElementById('page-title').innerText = "Canoagem/Surf/Windsurf - GPS Desligado";
        }

        async function getLocationName(lat, lon) {
            try {
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const geoData = await geoRes.json();
                return geoData.address.city || geoData.address.town || geoData.address.village || geoData.address.county || "Tua Zona";
            } catch (e) {
                return "Localização Desconhecida";
            }
        }

        async function findNearestBeach(lat, lon) {
            // Procura praias num raio de 50km usando a Overpass API
            const query = `[out:json];node(around:50000,${lat},${lon})["natural"="beach"];out 10;`;
            const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
            const data = await res.json();
            
            if(!data.elements || data.elements.length === 0) {
                throw new Error("Não há mar nem praias num raio de 50km. Vai andar de skate.");
            }
            
            // Descobrir qual é efetivamente a mais perto
            let closest = data.elements[0];
            let minD = Infinity;
            data.elements.forEach(el => {
                // Cálculo super básico de distância
                const d = Math.hypot(el.lat - lat, el.lon - lon);
                if(d < minD) { minD = d; closest = el; }
            });

            return { 
                lat: closest.lat, 
                lon: closest.lon, 
                name: closest.tags.name || "Praia (Nome desconhecido)" 
            };
        }

        async function fetchData(position) {
            let lat = position.coords.latitude;
            let lon = position.coords.longitude;
            let locationName = "A processar...";
            
            document.getElementById('status').innerText = 'A testar se tens água com marés aí perto...';

            try {
                // 1. Tentar ver se onde estás já tem maré
                let marineRes = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=ocean_tide&timezone=auto&forecast_days=1`);
                let marineData = await marineRes.json();

                // Se a API der erro, estás em terra. Vamos procurar a praia!
                if (!marineRes.ok || marineData.error) {
                    document.getElementById('status').innerText = 'Estás em terra seca. A procurar a praia mais próxima no radar...';
                    const beach = await findNearestBeach(lat, lon);
                    lat = beach.lat;
                    lon = beach.lon;
                    locationName = beach.name;
                    
                    // Pedir a maré novamente, mas agora para as coordenadas da praia
                    marineRes = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=ocean_tide&timezone=auto&forecast_days=1`);
                    marineData = await marineRes.json();
                    
                    if (!marineRes.ok || marineData.error) {
                        throw new Error("Encontrei a praia, mas a API das marés continua a embirrar. Deve ser num lago.");
                    }
                } else {
                    // Se funcionou à primeira, estás na costa. Pega no nome normal.
                    locationName = await getLocationName(lat, lon);
                }

                // Atualiza o título
                document.getElementById('page-title').innerText = `Canoagem/Surf/Windsurf - ${locationName}`;
                document.getElementById('status').innerText = 'A sacar os ventos...';

                // 2. Pedir o Vento (sempre para as coordenadas finais escolhidas)
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_10m,winddirection_10m&timezone=auto&forecast_days=1`);
                if (!weatherRes.ok) throw new Error("A API do vento pifou de vez.");
                const weatherData = await weatherRes.json();

                document.getElementById('status').style.display = 'none';

                const hourly = weatherData.hourly;
                const labels = hourly.time.map((timeString, index) => {
                    const date = new Date(timeString);
                    const hours = date.getHours().toString().padStart(2, '0') + ':00';
                    const dir = degToCompass(hourly.winddirection_10m[index]);
                    return [hours, dir]; 
                });

                const windSpeeds = hourly.windspeed_10m;
                const tides = marineData.hourly.ocean_tide;

                drawChart(labels, windSpeeds, tides);

            } catch (err) {
                document.getElementById('status').innerText = err.message || 'Deu merda grave. Vê a consola.';
                console.error(err);
            }
        }

        function showError(error) {
            let msg = "Erro desconhecido.";
            if (error.code === 1) msg = "Negaste o acesso à localização. Sem GPS ficas a ver navios.";
            if (error.code === 2) msg = "Não consegui aceder ao GPS.";
            if (error.code === 3) msg = "O pedido de GPS foi lento demais.";
            document.getElementById('status').innerText = msg;
            document.getElementById('page-title').innerText = "Canoagem/Surf/Windsurf - GPS Desligado";
        }

        function drawChart(labels, windSpeeds, tides) {
            const ctx = document.getElementById('surfChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Vento (km/h)',
                            data: windSpeeds,
                            borderColor: 'rgba(54, 162, 235, 1)',
                            backgroundColor: 'rgba(54, 162, 235, 0.1)',
                            yAxisID: 'y-wind',
                            tension: 0.3,
                            fill: true
                        },
                        {
                            label: 'Altura da Maré (m)',
                            data: tides,
                            borderColor: 'rgba(255, 99, 132, 1)',
                            backgroundColor: 'rgba(255, 99, 132, 0.1)',
                            yAxisID: 'y-tide',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        x: {
                            title: { display: true, text: 'Hora & Direção do Vento' }
                        },
                        'y-wind': {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: { display: true, text: 'Vento (km/h)' }
                        },
                        'y-tide': {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: 'Maré (m)' },
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
