<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coastal Master | Canoe & Surf</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --tide-blue: #3498db;
            --surf-purple: #9b59b6;
            --text: #c9d1d9;
            --title: #f0f6fc;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 20px; }
        h1 { font-weight: 600; font-size: 1.8rem; color: var(--title); margin: 0; }

        /* Mode Switcher */
        .mode-switch { background: var(--card); padding: 5px; border-radius: 12px; border: 1px solid var(--border); display: flex; gap: 5px; }
        .mode-btn { padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; background: transparent; color: var(--text); }
        .mode-btn.active { background: var(--tide-blue); color: #fff; }
        .mode-btn.active.surf { background: var(--surf-purple); }

        select, input { background: var(--bg); color: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 10px; outline: none; }

        #status { background: rgba(52, 152, 219, 0.1); padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 20px; border: 1px solid var(--border); }

        .dashboard-controls { display: none; grid-template-columns: auto 1fr 1fr; gap: 20px; align-items: center; background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.7rem; font-weight: 600; color: #8b949e; text-transform: uppercase; }

        .compass-box { background: var(--bg); padding: 5px; border-radius: 10px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; }
        
        .chart-container { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        #waveChartArea { display: none; } /* Hidden in Canoeing mode */

        .disclaimer { margin-top: 30px; font-size: 0.75rem; color: #484f58; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <select id="langPicker">
            <option value="en">English</option>
            <option value="pt">Português</option>
        </select>
        <div class="mode-switch">
            <button class="mode-btn active" id="btn-canoeing">Canoeing</button>
            <button class="mode-btn" id="btn-surf">Surf</button>
        </div>
    </div>

    <h1 id="ui-title" style="text-align: center; margin-bottom: 30px;">Coastal Forecast</h1>

    <div id="status">Syncing with Marine Satellites...</div>

    <div class="dashboard-controls" id="controls">
        <div class="compass-box">
            <svg viewBox="0 0 100 100" style="width: 35px;"><circle cx="50" cy="50" r="45" fill="none" stroke="#30363d" stroke-width="2"/><path d="M50 10 L42 50 L50 42 L58 50 Z" fill="#e74c3c"/><path d="M50 90 L42 50 L50 58 L58 50 Z" fill="#adbac7"/><text x="50" y="28" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">N</text></svg>
        </div>
        <div class="control-group">
            <label id="ui-label-day">Day</label>
            <select id="dayPicker"></select>
        </div>
        <div class="control-group">
            <label id="ui-label-sync">Tide Sync</label>
            <input type="time" id="tideSync" value="12:00">
        </div>
    </div>

    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>

    <div class="chart-container" id="waveChartArea">
        <canvas id="waveChart"></canvas>
    </div>

    <div class="disclaimer" id="ui-disclaimer"></div>
</div>

<script>
    const translations = {
        en: {
            titleCan: "Canoe Conditions", titleSurf: "Surf Forecast",
            labelDay: "Select Day", labelSync: "Sync Today's High Tide",
            chartTide: "Tide Level (m)", chartWind: "Avg Wind", chartGusts: "Gusts",
            chartWave: "Wave Height (m)", chartPeriod: "Period (s)",
            yWind: "km/h", yTide: "Height (m)", yWave: "Meters",
            disclaimer: "Data by Open-Meteo. Projections based on local sync. Safety first."
        },
        pt: {
            titleCan: "Condições Canoagem", titleSurf: "Previsão de Surf",
            labelDay: "Dia", labelSync: "Sincronizar Preia-mar Hoje",
            chartTide: "Maré (m)", chartWind: "Vento Médio", chartGusts: "Rajadas",
            chartWave: "Ondulação (m)", chartPeriod: "Período (s)",
            yWind: "km/h", yTide: "Altura (m)", yWave: "Metros",
            disclaimer: "Dados via Open-Meteo. Marés projetadas via ajuste local. Segurança primeiro."
        }
    };

    let weatherData = null, marineData = null, daysMap = {}, charts = { main: null, wave: null };
    let currentLang = localStorage.getItem('preferredLang') || 'en';
    let currentMode = 'canoeing'; // 'canoeing' or 'surf'
    const LUNAR_CYCLE = 12.4206;

    const updateUI = () => {
        const t = translations[currentLang];
        document.getElementById('ui-title').innerText = currentMode === 'canoeing' ? t.titleCan : t.titleSurf;
        document.getElementById('ui-label-day').innerText = t.labelDay;
        document.getElementById('ui-label-sync').innerText = t.labelSync;
        document.getElementById('ui-disclaimer').innerHTML = t.disclaimer;
        document.getElementById('waveChartArea').style.display = currentMode === 'surf' ? 'block' : 'none';
        if (weatherData) render();
    };

    const getWindColor = (s) => {
        const limit1 = currentMode === 'canoeing' ? 12 : 15;
        const limit2 = currentMode === 'canoeing' ? 22 : 30;
        return s < limit1 ? '#2ecc71' : (s < limit2 ? '#f1c40f' : '#e74c3c');
    };

    const render = () => {
        const dateKey = document.getElementById('dayPicker').value;
        const t = translations[currentLang], idxs = daysMap[dateKey];
        const firstH = new Date(weatherData.hourly.time[0]).getTime();
        const labels = idxs.map(i => [`${new Date(weatherData.hourly.time[i]).getHours()}h`, ['↓', '↙', '←', '↖', '↑', '↗', '→', '↘'][Math.round(weatherData.hourly.wind_direction_10m[i] / 45) % 8]]);
        
        // Tide & Wind Chart
        const tides = idxs.map(i => (2 + 1.5 * Math.sin((((new Date(weatherData.hourly.time[i]).getTime() - firstH) / 3600000) / LUNAR_CYCLE) * Math.PI * 2 + parseFloat(localStorage.getItem('tideOffset') || 0))).toFixed(2));
        if (charts.main) charts.main.destroy();
        charts.main = new Chart(document.getElementById('mainChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { type: 'line', label: t.chartTide, data: tides, borderColor: '#3498db', backgroundColor: 'rgba(52,152,219,0.1)', fill: true, tension: 0.4, yAxisID: 'yT', pointRadius: 0 },
                    { type: 'line', label: t.chartGusts, data: idxs.map(i => weatherData.hourly.wind_gusts_10m[i]), borderColor: 'rgba(255,255,255,0.2)', borderDash: [5,5], yAxisID: 'yV', pointRadius: 0 },
                    { type: 'bar', label: t.chartWind, data: idxs.map(i => weatherData.hourly.wind_speed_10m[i]), backgroundColor: idxs.map(i => getWindColor(weatherData.hourly.wind_speed_10m[i])), borderRadius: 4, yAxisID: 'yV' }
                ]
            },
            options: { scales: { yV: { position: 'left', title: { display: true, text: t.yWind } }, yT: { position: 'right', min: 0, max: 4, grid: { display: false }, title: { display: true, text: t.yTide, color: '#3498db' } } } }
        });

        // Wave Chart (Only Surf)
        if (currentMode === 'surf' && marineData) {
            if (charts.wave) charts.wave.destroy();
            charts.wave = new Chart(document.getElementById('waveChart'), {
                type: 'bar',
                data: {
                    labels: idxs.map(i => `${new Date(weatherData.hourly.time[i]).getHours()}h`),
                    datasets: [
                        { type: 'line', label: t.chartPeriod, data: idxs.map(i => marineData.hourly.wave_period[i]), borderColor: '#e67e22', yAxisID: 'yP', tension: 0.3, pointRadius: 2 },
                        { type: 'bar', label: t.chartWave, data: idxs.map(i => marineData.hourly.wave_height[i]), backgroundColor: 'rgba(155, 89, 182, 0.6)', borderRadius: 4, yAxisID: 'yW' }
                    ]
                },
                options: { scales: { yW: { position: 'left', title: { display: true, text: t.yWave } }, yP: { position: 'right', grid: { display: false }, title: { display: true, text: 'Seconds' } } } }
            });
        }
    };

    const setupMode = (mode) => {
        currentMode = mode;
        document.getElementById('btn-canoeing').className = `mode-btn ${mode === 'canoeing' ? 'active' : ''}`;
        document.getElementById('btn-surf').className = `mode-btn ${mode === 'surf' ? 'active surf' : ''}`;
        updateUI();
    };

    document.getElementById('btn-canoeing').onclick = () => setupMode('canoeing');
    document.getElementById('btn-surf').onclick = () => setupMode('surf');
    document.getElementById('langPicker').onchange = (e) => { currentLang = e.target.value; localStorage.setItem('preferredLang', currentLang); updateUI(); };

    navigator.geolocation.getCurrentPosition(async (p) => {
        const { latitude: lat, longitude: lon } = p.coords;
        try {
            const [wR, mR] = await Promise.all([
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_gusts_10m,wind_direction_10m&timezone=auto`),
                fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=wave_height,wave_period&timezone=auto`)
            ]);
            weatherData = await wR.json(); marineData = await mR.json();
            weatherData.hourly.time.forEach((t, i) => { const d = t.split('T')[0]; if (!daysMap[d]) daysMap[d] = []; daysMap[d].push(i); });
            const sel = document.getElementById('dayPicker');
            Object.keys(daysMap).forEach(d => { const opt = document.createElement('option'); opt.value = d; opt.innerText = new Date(d).toLocaleDateString('pt-PT', { weekday: 'short', day: 'numeric' }); sel.appendChild(opt); });
            
            const tideIn = document.getElementById('tideSync');
            tideIn.value = localStorage.getItem('tideTime') || "12:00";
            const sync = () => {
                const [h, m] = tideIn.value.split(':'), diff = (new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate(), h, m) - new Date(weatherData.hourly.time[0])) / 3600000;
                localStorage.setItem('tideOffset', (Math.PI / 2) - ((diff / LUNAR_CYCLE) * Math.PI * 2));
                localStorage.setItem('tideTime', tideIn.value);
                render();
            };
            tideIn.onchange = sync; sel.onchange = render;
            document.getElementById('status').style.display = 'none';
            document.getElementById('controls').style.display = 'grid';
            sync(); updateUI();
        } catch (e) { document.getElementById('status').innerText = "API Error."; }
    }, () => { document.getElementById('status').innerText = "Location access denied."; });
</script>

</body>
</html>
