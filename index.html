<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marine Conditions & Tide Projection</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { font-weight: 300; color: #f0f6fc; margin: 0; flex-grow: 1; text-align: center; }
        
        #status { text-align: center; color: #8b949e; font-size: 0.9em; margin-bottom: 20px; }
        
        .dashboard-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 40px; /* Increased gap to separate compass */
            justify-content: center;
            align-items: flex-end; /* Aligns compass with the inputs/selects */
            background: #161b22;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #30363d;
            margin-bottom: 25px;
            display: none;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }

        label { font-size: 0.85em; font-weight: 600; color: #8b949e; text-transform: uppercase; }
        
        select, input {
            padding: 10px;
            background: #0d1117;
            color: #fff;
            border: 1px solid #30363d;
            border-radius: 4px;
            outline: none;
            height: 42px;
            box-sizing: border-box;
        }

        /* Compass Box - Now standalone on the far left */
        .compass-box {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d1117;
            padding: 2px;
            border: 1px solid #30363d;
            border-radius: 8px;
            height: 42px;
            width: 42px;
            box-sizing: border-box;
            margin-right: 20px; /* Extra spacing from the controls */
        }
        .compass-svg {
            width: 32px;
            height: 32px;
        }

        .chart-container {
            background: #161b22;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .disclaimer {
            margin-top: 30px;
            font-size: 0.8em;
            color: #6e7681;
            text-align: center;
            border-top: 1px solid #30363d;
            padding-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="lang-switch">
            <select id="langPicker">
                <option value="en">English</option>
                <option value="pt">Português</option>
            </select>
        </div>
        <h1 id="ui-title">Coastal Forecast</h1>
        <div style="width: 80px;"></div>
    </div>

    <div id="status">Establishing connection...</div>

    <div class="dashboard-controls" id="controls">
        
        <!-- Compass on the far left -->
        <div class="compass-box" title="North Reference">
            <svg class="compass-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#30363d" stroke-width="2"/>
                <path d="M50 10 L40 50 L50 40 L60 50 Z" fill="#e74c3c"/>
                <path d="M50 90 L40 50 L50 60 L60 50 Z" fill="#c9d1d9"/>
                <text x="50" y="26" fill="#f0f6fc" font-size="14" font-weight="bold" text-anchor="middle">N</text>
            </svg>
        </div>

        <!-- Date Control Group -->
        <div class="control-group">
            <label id="ui-label-day">Forecast Day</label>
            <select id="dayPicker"></select>
        </div>

        <!-- Tide Sync Control Group -->
        <div class="control-group">
            <label id="ui-label-sync">Sync Tide (High Tide)</label>
            <input type="time" id="tideSync" value="12:00">
        </div>
    </div>

    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>

    <div class="disclaimer" id="ui-disclaimer"></div>
</div>

<script>
    const translations = {
        en: {
            title: "Coastal Forecast",
            statusLoc: "Detecting location...",
            statusData: "Retrieving global data...",
            labelDay: "Forecast Day",
            labelSync: "Sync Tide (High Tide Today)",
            chartTide: "Tide Height (m)",
            chartWind: "Avg. Wind (km/h)",
            chartGusts: "Gusts (km/h)",
            yAxisWind: "Wind Speed (km/h)",
            yAxisTide: "Height (m)",
            disclaimer: "<strong>Note:</strong> Meteorological data is provided by the Open-Meteo API. Tides for subsequent days are mathematically modeled based on your initial sync. These projections are for informational purposes only."
        },
        pt: {
            title: "Previsão Costeira",
            statusLoc: "A detetar localização...",
            statusData: "A obter dados globais...",
            labelDay: "Dia da Previsão",
            labelSync: "Sincronizar Maré (Preia-mar hoje)",
            chartTide: "Altura da Maré (m)",
            chartWind: "Vento Médio (km/h)",
            chartGusts: "Rajadas (km/h)",
            yAxisWind: "Velocidade do Vento (km/h)",
            yAxisTide: "Altura (m)",
            disclaimer: "<strong>Nota:</strong> Os dados meteorológicos são fornecidos pela API Open-Meteo. As marés são modeladas matematicamente com base na sincronização inicial. Estas projeções são informativas apenas."
        }
    };

    let weatherData = null;
    let daysMap = {};
    let activeChart = null;
    let currentLang = localStorage.getItem('preferredLang') || 'en';
    const LUNAR_CYCLE = 12.4206;

    const langPicker = document.getElementById('langPicker');
    langPicker.value = currentLang;

    function updateUIText() {
        const t = translations[currentLang];
        document.getElementById('ui-title').innerText = t.title;
        document.getElementById('ui-label-day').innerText = t.labelDay;
        document.getElementById('ui-label-sync').innerText = t.labelSync;
        document.getElementById('ui-disclaimer').innerHTML = t.disclaimer;
        if (weatherData) render(document.getElementById('dayPicker').value);
    }

    langPicker.addEventListener('change', (e) => {
        currentLang = e.target.value;
        localStorage.setItem('preferredLang', currentLang);
        updateUIText();
    });

    let savedOffset = localStorage.getItem('tideOffset') || 0;
    document.getElementById('tideSync').value = localStorage.getItem('tideTime') || "12:00";

    function getWindIcon(deg) {
        const arrows = ['↓', '↙', '←', '↖', '↑', '↗', '→', '↘'];
        return arrows[Math.round(deg / 45) % 8];
    }

    function render(dateKey) {
        const t = translations[currentLang];
        const indices = daysMap[dateKey];
        const firstHour = new Date(weatherData.hourly.time[0]).getTime();
        
        const labels = indices.map(i => {
            const date = new Date(weatherData.hourly.time[i]);
            return [`${date.getHours()}:00`, getWindIcon(weatherData.hourly.wind_direction_10m[i])];
        });

        const windSpeeds = indices.map(i => weatherData.hourly.wind_speed_10m[i]);
        const windGusts = indices.map(i => weatherData.hourly.wind_gusts_10m[i]);

        const tideHeights = indices.map(i => {
            const currentTime = new Date(weatherData.hourly.time[i]).getTime();
            const hoursSinceEpoch = (currentTime - firstHour) / 3600000;
            const phase = (hoursSinceEpoch / LUNAR_CYCLE) * Math.PI * 2;
            return (2 + 1.5 * Math.sin(phase + parseFloat(savedOffset))).toFixed(2);
        });

        if (activeChart) activeChart.destroy();
        const ctx = document.getElementById('mainChart').getContext('2d');
        activeChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        type: 'line', label: t.chartTide, data: tideHeights,
                        borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.1)',
                        fill: true, tension: 0.4, yAxisID: 'yT', pointRadius: 0
                    },
                    {
                        type: 'line', label: t.chartGusts, data: windGusts,
                        borderColor: 'rgba(255, 255, 255, 0.4)', borderDash: [5,5], yAxisID: 'yW', pointRadius: 2
                    },
                    {
                        type: 'bar', label: t.chartWind, data: windSpeeds,
                        backgroundColor: windSpeeds.map(s => s < 15 ? '#2ecc71' : (s < 30 ? '#f1c40f' : '#e74c3c')),
                        borderRadius: 4, yAxisID: 'yW'
                    }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    yW: { position: 'left', title: { display: true, text: t.yAxisWind, color: '#fff' } },
                    yT: { position: 'right', title: { display: true, text: t.yAxisTide, color: '#3498db' }, grid: { display: false }, min: 0, max: 4 }
                },
                plugins: { legend: { labels: { color: '#c9d1d9' } } }
            }
        });
    }

    function calculateOffset(timeString) {
        const [hours, mins] = timeString.split(':');
        const now = new Date();
        const highTideDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, mins);
        const firstHourDate = new Date(weatherData.hourly.time[0]);
        const diffInHours = (highTideDate - firstHourDate) / 3600000;
        const newOffset = (Math.PI / 2) - ((diffInHours / LUNAR_CYCLE) * Math.PI * 2);
        savedOffset = newOffset;
        localStorage.setItem('tideOffset', newOffset);
        localStorage.setItem('tideTime', timeString);
        if(weatherData) render(document.getElementById('dayPicker').value);
    }

    updateUIText();

    navigator.geolocation.getCurrentPosition(async (p) => {
        const { latitude: lat, longitude: lon } = p.coords;
        document.getElementById('status').innerText = translations[currentLang].statusData;

        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_gusts_10m,wind_direction_10m&timezone=auto`);
            weatherData = await res.json();

            weatherData.hourly.time.forEach((t, i) => {
                const d = t.split('T')[0];
                if (!daysMap[d]) daysMap[d] = [];
                daysMap[d].push(i);
            });

            const sel = document.getElementById('dayPicker');
            Object.keys(daysMap).forEach(d => {
                const opt = document.createElement('option');
                opt.value = d;
                const dateObj = new Date(d);
                opt.innerText = dateObj.toLocaleDateString(currentLang === 'en' ? 'en-GB' : 'pt-PT', { weekday: 'short', day: 'numeric', month: 'short' });
                sel.appendChild(opt);
            });

            document.getElementById('status').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';

            const tideInput = document.getElementById('tideSync');
            tideInput.addEventListener('change', (e) => calculateOffset(e.target.value));
            
            calculateOffset(tideInput.value);
            sel.onchange = (e) => render(e.target.value);
        } catch (e) { document.getElementById('status').innerText = "Service unavailable."; }
    }, () => { 
        document.getElementById('status').innerText = translations[currentLang].statusLoc; 
    });
</script>

</body>
</html>
