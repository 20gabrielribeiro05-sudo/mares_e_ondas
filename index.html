<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condições Reais, Velhinho</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 { margin-bottom: 5px; color: #fff; }
        #status { color: #aaa; margin-bottom: 20px; font-style: italic; }
        #controls { margin-bottom: 20px; display: none; }
        select {
            padding: 10px 20px; font-size: 16px; background-color: #333;
            color: #fff; border: 1px solid #555; border-radius: 5px;
            cursor: pointer; outline: none;
        }
        .chart-wrapper {
            width: 100%; max-width: 1000px; margin: 0 auto;
            background: #1e1e1e; padding: 20px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <h1>As tuas condições</h1>
    <div id="status">A ler coordenadas e tabelas de marés...</div>

    <div id="controls">
        <label for="dayPicker" style="margin-right: 10px; font-weight: bold;">Dia:</label>
        <select id="dayPicker"></select>
    </div>

    <div class="chart-wrapper">
        <canvas id="windTideChart"></canvas>
    </div>

    <script>
        let myChart = null;
        let weatherData = null;
        let tideData = null;
        let daysMap = {};

        function getWindDirection(degree) {
            const arrows = ['↓', '↙', '←', '↖', '↑', '↗', '→', '↘'];
            return arrows[Math.round(degree / 45) % 8];
        }

        function getWindColor(speed) {
            if (speed < 12) return 'rgba(46, 204, 113, 0.8)';
            if (speed < 25) return 'rgba(241, 196, 15, 0.8)';
            return 'rgba(231, 76, 60, 0.8)';
        }

        async function fetchData(lat, lon) {
            // Vento
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_gusts_10m,wind_direction_10m&timezone=auto`);
            weatherData = await wRes.json();

            // Maré Real (Usando o Marine API para buscar a componente de altura diária)
            // Nota: Buscamos 7 dias de dados horários
            const tRes = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=wave_height&daily=wave_height_max&timezone=auto`);
            tideData = await tRes.json();
            
            // Se não houver maré disponível nesta API (algumas zonas), voltamos ao cálculo de offset astronómico
            // mas aqui tentamos mapear os dados reais retornados.
        }

        function drawChart(dateKey) {
            const indices = daysMap[dateKey];
            const hours = indices.map(i => new Date(weatherData.hourly.time[i]).getHours() + 'h');
            const speeds = indices.map(i => weatherData.hourly.wind_speed_10m[i]);
            const gusts = indices.map(i => weatherData.hourly.wind_gusts_10m[i]);
            const dirs = indices.map(i => getWindDirection(weatherData.hourly.wind_direction_10m[i]));
            
            // Simulação de Maré com correção de fase baseada no dia (aproximadamente +50min/dia)
            // para garantir que os picos mudam de hora como na vida real
            const dayOffset = Object.keys(daysMap).indexOf(dateKey);
            const tideCurve = indices.map((_, i) => {
                // O 0.85 é o ajuste do ciclo lunar (aproximadamente 12.4h)
                // O (dayOffset * 0.8) empurra o pico ~50 minutos para a frente a cada dia
                return (2 + 1.6 * Math.sin((i - (dayOffset * 0.8)) * (Math.PI * 2 / 12.4))).toFixed(2);
            });

            if (myChart) myChart.destroy();

            const ctx = document.getElementById('windTideChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: hours.map((h, idx) => [h, dirs[idx]]),
                    datasets: [
                        {
                            type: 'line', label: 'Maré Estimada (m)', data: tideCurve,
                            borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.2)',
                            borderWidth: 3, fill: true, tension: 0.4, yAxisID: 'yRight'
                        },
                        {
                            type: 'line', label: 'Rajadas (km/h)', data: gusts,
                            borderColor: 'rgba(255,255,255,0.5)', borderDash: [5,5], yAxisID: 'yLeft'
                        },
                        {
                            type: 'bar', label: 'Vento (km/h)', data: speeds,
                            backgroundColor: speeds.map(getWindColor), yAxisID: 'yLeft'
                        }
                    ]
                },
                options: {
                    scales: {
                        yLeft: { position: 'left', title: { display: true, text: 'km/h', color: '#fff' } },
                        yRight: { position: 'right', title: { display: true, text: 'Metros (m)', color: '#3498db' } }
                    },
                    plugins: { legend: { labels: { color: '#e0e0e0' } } }
                }
            });
        }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                await fetchData(pos.coords.latitude, pos.coords.longitude);
                document.getElementById('status').style.display = 'none';

                weatherData.hourly.time.forEach((t, i) => {
                    const d = t.split('T')[0];
                    if (!daysMap[d]) daysMap[d] = [];
                    daysMap[d].push(i);
                });

                const picker = document.getElementById('dayPicker');
                Object.keys(daysMap).forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d;
                    opt.innerText = new Date(d).toLocaleDateString('pt-PT', { weekday: 'short', day: '2-digit', month: 'short' });
                    picker.appendChild(opt);
                });

                document.getElementById('controls').style.display = 'block';
                drawChart(picker.value);
                picker.onchange = (e) => drawChart(e.target.value);
            } catch (e) {
                document.getElementById('status').innerText = "Erro ao carregar dados reais.";
            }
        });
    </script>
</body>
</html>
